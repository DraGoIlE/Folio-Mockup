version: "3.9"

services:
  Nginx:
    image: nginx:1.27-alpine
    container_name: gateway-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - login-service
      - matchmaking-service
      - user-service
      - chat-service
      - ranking-service
    networks:
      - app-network
    restart: unless-stopped
  
  login-service:
     build: ./login-service
     container_name: login-service
     environment:
       - DATABASE_URL=postgres://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
       - REDIS_URL=redis://redis:6379
     depends_on:
       postgres:
         condition: service_healthy
       redis:
         condition: service_healthy
     networks:
       - app-network
     restart: unless-stopped

  matchmaking-service:
     build: ./matchmaking-service
     container_name: matchmaking-service
     environment:
       - DATABASE_URL=postgres://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
       - REDIS_URL=redis://redis:6379
       - CHAT_SERVICE_URL=http://chat-service:3000
     depends_on:
       postgres:
         condition: service_healthy
       redis:
         condition: service_healthy
     networks:
      - app-network
     restart: unless-stopped

  user-service:
     build: ./user-service
     container_name: user-service
     environment:
       - DATABASE_URL=postgres://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
       - REDIS_URL=redis://redis:6379
     depends_on:
       postgres:
         condition: service_healthy
     networks:
       - app-network
     restart: unless-stopped

  chat-service:
     build: ./chat-service
     container_name: chat-service
     environment:
       - DATABASE_URL=postgres://${DB_USER}:${DB_PASS}@postgres:5432/${DB_NAME}
       - REDIS_URL=redis://redis:6379
     depends_on:
       postgres:
         condition: service_healthy
       redis:
         condition: service_healthy
     networks:
       - app-network
     restart: unless-stopped

  ranking-service:
     build: ./ranking-service
     container_name: ranking-service
     environment:
       - REDIS_URL=redis://redis:6379
     depends_on:
       redis:
         condition: service_healthy
     networks:
      - app-network
     restart: unless-stopped

  postgres:
     image: postgres:17-alpine
     container_name: postgres-db
     environment:
       - POSTGRES_USER=${DB_USER}
       - POSTGRES_PASSWORD=${DB_PASS}
       - POSTGRES_DB=${DB_NAME}
     volumes:
       - postgres-data:/var/lib/postgresql/data
     healthcheck:
       test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
       interval: 10s
       timeout: 5s
       retries: 5
     networks:
       - app-network
     restart: unless-stopped

  redis:
     image: redis:7-alpine
     container_name: redis-cache
     volumes:
       - redis-data:/data
     healthcheck:
       test: ["CMD", "redis-cli", "ping"]
       interval: 10s
       timeout: 5s
       retries: 5
     networks:
       - app-network
     restart: unless-stopped

volumes:
  postgres-data:
  redis-data:

networks:
  app-network:
    driver: bridge